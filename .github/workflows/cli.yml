name: CI

on:
  push:
    branches:
      - main
    paths:
      - 'wraas/**'
      - '.releaserc.json'
  pull_request:
    paths:
      - 'wraas/**'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: wraas/go.mod

      - name: Build
        working-directory: wraas
        run: go build -o wraas .

      - name: Unit tests
        working-directory: wraas
        run: go test -v ./...

  e2e:
    needs: build
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: wraas/go.mod

      - name: Build binary
        run: cd wraas && go build -o ../bin/wraas .

      - name: Set up bats
        uses: bats-core/bats-action@77d6fb60505b4d0d1d73e48bd035b55074bbfb43 # v4.0.0

      - name: Run E2E tests
        run: bats wraas/e2e_test.bats
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  release-dry-run:
    needs: e2e
    if: github.event_name == 'pull_request'
    permissions:
      contents: write
    uses: ./.github/workflows/release.yaml
    with:
      dry_run: true

  goreleaser-dry-run:
    needs: e2e
    if: github.event_name == 'pull_request'
    permissions:
      contents: write
    uses: ./.github/workflows/goreleaser.yaml
    with:
      dry_run: true

  release:
    needs: e2e
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: write
    uses: ./.github/workflows/release.yaml

  goreleaser:
    needs: release
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: write
    uses: ./.github/workflows/goreleaser.yaml
    secrets: inherit
