name: GoReleaser

on:
  workflow_call:
    inputs:
      dry_run:
        description: "Run in snapshot mode (no publish)"
        type: boolean
        default: false
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Run in snapshot mode (no publish)"
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0

      - name: Get latest tag
        if: ${{ !inputs.dry_run }}
        id: tag
        run: |
          git fetch --tags
          TAG=$(git describe --tags --abbrev=0)
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Check tag points to HEAD
        if: ${{ !inputs.dry_run }}
        id: check
        run: |
          TAG_SHA=$(git rev-parse "${{ steps.tag.outputs.tag }}")
          HEAD_SHA=$(git rev-parse HEAD)
          if [ "$TAG_SHA" = "$HEAD_SHA" ]; then
            echo "match=true" >> "$GITHUB_OUTPUT"
          else
            echo "match=false" >> "$GITHUB_OUTPUT"
            echo "No new tag at HEAD, skipping GoReleaser"
          fi

      - name: Setup Go
        if: inputs.dry_run || steps.check.outputs.match == 'true'
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: wraas/go.mod

      - name: Run GoReleaser
        if: inputs.dry_run || steps.check.outputs.match == 'true'
        uses: goreleaser/goreleaser-action@5daf1e915a5f0af01ddbcd89a43b8061ff4f1a89 # v7.2.2
        with:
          version: latest
          args: ${{ inputs.dry_run && 'release --snapshot --clean' || 'release --clean' }}
          workdir: wraas
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
